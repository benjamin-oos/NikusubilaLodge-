<!DOCTYPE html>
<html>
<head>
    <title>3D Lodge - Benjamin's</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 20px;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }
        #info span { color: #f1c40f; font-size: 28px; }
    </style>
</head>
<body>
    <div id="info">
        <span>🏨</span> Benjamin's Lodge <span>🏨</span><br>
        <small style="font-size: 14px;">Drag to look around • Scroll to zoom</small>
    </div>

    <!-- Load 3D library -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue

        // --- CAMERA ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        camera.lookAt(0, 0, 0);

        // --- RENDERER ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- CONTROLS (so you can drag to look around) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0);
        controls.update();

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(10, 15, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
        fillLight.position.set(-5, 0, 5);
        scene.add(fillLight);

        // --- GROUND (grassy field) ---
        const groundGeometry = new THREE.CircleGeometry(10, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2e8b57, side: THREE.DoubleSide });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- THE LODGE (main building) ---
        const lodgeGroup = new THREE.Group();

        // Walls (wooden cabin feel)
        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
        const wall = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 3), wallMaterial);
        wall.position.y = 1.25;
        wall.castShadow = true;
        lodgeGroup.add(wall);

        // Roof (triangle shape)
        const roofShape = new THREE.Shape();
        roofShape.moveTo(-2, 0);
        roofShape.lineTo(0, 1.5);
        roofShape.lineTo(2, 0);
        roofShape.lineTo(-2, 0);
        const roofExtrudeSettings = { depth: 3.2, bevelEnabled: false };
        const roofGeometry = new THREE.ExtrudeGeometry(roofShape, roofExtrudeSettings);
        const roofMaterial = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.6 });
        const roof = new THREE.Mesh(roofGeometry, roofMaterial);
        roof.position.set(-1.6, 2.5, -1.6);
        roof.castShadow = true;
        lodgeGroup.add(roof);

        // Door
        const doorMaterial = new THREE.MeshStandardMaterial({ color: 0x5D3A1A });
        const door = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.1), doorMaterial);
        door.position.set(0, 0.6, 1.51);
        lodgeGroup.add(door);

        // Door handle
        const handleMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });
        const handle = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), handleMaterial);
        handle.position.set(0.25, 0.6, 1.56);
        lodgeGroup.add(handle);

        // Windows (2 on front)
        const windowMaterial = new THREE.MeshStandardMaterial({ color: 0x87CEEB, emissive: 0x224466, emissiveIntensity: 0.3 });
        const windowFrame = new THREE.MeshStandardMaterial({ color: 0x333333 });

        function createWindow(x, y, z) {
            const group = new THREE.Group();
            const glass = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.05), windowMaterial);
            group.add(glass);
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.08), windowFrame);
            group.add(frame);
            group.position.set(x, y, z);
            return group;
        }

        lodgeGroup.add(createWindow(-0.8, 1.6, 1.51));
        lodgeGroup.add(createWindow(0.8, 1.6, 1.51));

        // Chimney
        const chimneyMaterial = new THREE.MeshStandardMaterial({ color: 0x8B0000 });
        const chimney = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.4), chimneyMaterial);
        chimney.position.set(1.2, 2.8, -0.8);
        chimney.castShadow = true;
        lodgeGroup.add(chimney);

        // Add lodge to scene
        lodgeGroup.position.y = 0;
        scene.add(lodgeGroup);

        // --- TREES (surrounding the lodge) ---
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.15, 0.2, 1, 8),
                new THREE.MeshStandardMaterial({ color: 0x8B4513 })
            );
            trunk.position.y = 0.5;
            group.add(trunk);

            const leaves = new THREE.Mesh(
                new THREE.ConeGeometry(0.7, 1.2, 8),
                new THREE.MeshStandardMaterial({ color: 0x228B22 })
            );
            leaves.position.y = 1.4;
            group.add(leaves);

            group.position.set(x, 0, z);
            return group;
        }

        scene.add(createTree(-2.5, -2.5));
        scene.add(createTree(3, -2.5));
        scene.add(createTree(-3, 2.5));
        scene.add(createTree(3.2, 2.8));
        scene.add(createTree(0, -3.5));

        // --- FLOATING PARTICLES (magic fireflies) ---
        const particleCount = 100;
        const particlesGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
            if (i % 3 === 1) positions[i] += 0.5; // Keep them above ground
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            color: 0xffaa00,
            size: 0.08,
            transparent: true,
            opacity: 0.8,
        });
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Rotate particles slowly
            particles.rotation.y += 0.001;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- HANDLE RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
